<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SNS資産価値 詳細レポート</title>
<meta name="description" content="あなたのSNS資産価値を詳細分析。改善ポイントと収益化ロードマップ付き。">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#000;--bg-primary:#000;--bg-secondary:#16181c;--bg-third:#1d1f23;
  --border:#2f3336;--border-light:#38444d;
  --text-primary:#e7e9ea;--text-secondary:#71767b;--text-third:#536471;
  --blue:#1d9bf0;--blue-dark:#1a8cd8;--blue-light:rgba(29,155,240,.1);
  --green:#00ba7c;--green-light:rgba(0,186,124,.1);
  --amber:#f7931a;--amber-light:rgba(247,147,26,.1);
  --line-green:#06C755;
  --red:#f4212e;--red-light:rgba(244,33,46,.1);
}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans",sans-serif;
  background:var(--bg-primary);color:var(--text-primary);
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
a{color:var(--blue);text-decoration:none}

.container{max-width:600px;margin:0 auto;padding:0 16px}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 16px rgba(6,199,85,.25)}50%{box-shadow:0 0 36px rgba(6,199,85,.5)}}
@keyframes countPulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
.reveal{opacity:0;transform:translateY(16px);transition:opacity .55s ease-out,transform .55s ease-out}
.reveal.visible{opacity:1;transform:translateY(0)}

/* Header */
.x-header{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  height:53px;padding:0 16px;
  background:rgba(0,0,0,.75);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.x-header .logo{display:flex;align-items:center;gap:6px}
.x-header .logo svg{width:24px;height:24px;color:var(--text-primary)}
.x-header .logo span{font-size:16px;font-weight:700;letter-spacing:-.02em}

/* Report badge */
.report-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;color:var(--green);
  background:var(--green-light);border:1px solid rgba(0,186,124,.2);
  border-radius:999px;padding:4px 12px;margin-left:8px;
}

/* Section */
.section{padding:20px 0;border-bottom:1px solid var(--border)}
.section:last-child{border-bottom:none}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-num{
  width:24px;height:24px;border-radius:50%;
  background:var(--blue);color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.section-title{font-size:17px;font-weight:800}

/* Value card */
.value-card{
  text-align:center;padding:24px 16px;margin:8px 0;
  border:1px solid var(--border);border-radius:16px;
  background:var(--bg-secondary);
}
.vc-label{font-size:13px;color:var(--text-secondary);font-weight:500;margin-bottom:6px}
.vc-amount{font-size:40px;font-weight:900;letter-spacing:-.03em;color:var(--text-primary);margin-bottom:10px}
.percentile-pill{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--blue-light);border:1px solid rgba(29,155,240,.2);
  border-radius:999px;padding:4px 12px;
  font-size:13px;font-weight:700;color:var(--blue);
}
.vc-conf{font-size:11px;color:var(--text-third);margin-top:8px}
.platform-label{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text-secondary);margin-bottom:10px;
}

/* Breakdown bars */
.breakdown-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(47,51,54,.5);
}
.breakdown-item:last-child{border-bottom:none}
.bd-label{width:120px;font-size:13px;color:var(--text-secondary);flex-shrink:0}
.bd-bar-wrap{flex:1;height:8px;background:var(--bg-third);border-radius:4px;overflow:hidden}
.bd-bar{height:100%;border-radius:4px;transition:width 1.2s ease-out}
.bd-value{width:80px;text-align:right;font-size:14px;font-weight:700;flex-shrink:0}

/* Stat cards */
.stat-section{border:1px solid var(--border);border-radius:16px;background:var(--bg-secondary);margin-top:12px;overflow:hidden}
.stat-section .sh{padding:14px 16px 0;font-size:15px;font-weight:800}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-row .sr-label{font-size:14px;color:var(--text-secondary)}
.stat-row .sr-value{font-size:15px;font-weight:700}
.stat-note{padding:4px 16px 12px;text-align:right;font-size:11px;color:var(--text-third)}

/* Revenue simulation */
.rev-card{
  border:1px solid var(--border);border-radius:16px;
  background:var(--bg-secondary);padding:16px;margin-top:12px;
}
.rev-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.rev-title{font-size:14px;font-weight:700}
.rev-model-badge{
  font-size:11px;color:var(--amber);background:var(--amber-light);
  border:1px solid rgba(247,147,26,.2);border-radius:999px;padding:3px 10px;
}
.rev-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(47,51,54,.5)}
.rev-row:last-child{border-bottom:none}
.rev-label{font-size:13px;color:var(--text-secondary)}
.rev-value{font-size:15px;font-weight:700}
.rev-value.highlight{color:var(--green);font-size:17px}

/* Insight cards */
.insight-card{border:1px solid var(--border);border-radius:16px;background:var(--bg-secondary);margin-top:12px;padding:16px}
.insight-card .ic-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ic-dot-blue{background:var(--blue)}
.ic-dot-green{background:var(--green)}
.ic-dot-amber{background:var(--amber)}
.ic-dot-red{background:var(--red)}
.insight-card h3{font-size:15px;font-weight:700}
.insight-card p{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:4px}

/* Roadmap */
.roadmap-month{
  border:1px solid var(--border);border-radius:16px;
  background:var(--bg-secondary);margin-top:12px;overflow:hidden;
}
.rm-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;background:var(--bg-third);
  border-bottom:1px solid var(--border);
}
.rm-num{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.rm-label{font-size:14px;font-weight:700}
.rm-body{padding:12px 16px}
.rm-task{
  display:flex;align-items:flex-start;gap:8px;
  padding:6px 0;font-size:13px;color:var(--text-secondary);line-height:1.5;
}
.rm-check{color:var(--blue);flex-shrink:0;margin-top:2px}

/* Profile tips */
.tip-card{
  border:1px solid var(--border);border-radius:12px;
  background:var(--bg-third);padding:12px 14px;margin-top:8px;
}
.tip-label{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.tip-text{font-size:13px;color:var(--text-secondary);line-height:1.6}

/* CTA */
.line-card{
  border-radius:16px;padding:24px 16px;text-align:center;margin-top:16px;
  border:1px solid rgba(29,155,240,.25);
  background:linear-gradient(180deg,rgba(29,155,240,.06),var(--bg-secondary));
}
.line-card p{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:16px}
.line-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--line-green);color:#fff;font-size:16px;font-weight:700;
  border:none;border-radius:999px;padding:14px 28px;cursor:pointer;
  text-decoration:none;transition:all .15s;
}
.line-btn:active{transform:scale(.96)}
.line-btn svg{width:22px;height:22px}
.line-sub{font-size:12px;color:var(--text-third);margin-top:10px}

/* Footer */
.report-footer{text-align:center;padding:32px 16px;font-size:11px;color:var(--text-third);line-height:1.7}

/* Error state */
.error-state{text-align:center;padding:60px 20px}
.error-state h2{font-size:20px;margin-bottom:12px}
.error-state p{color:var(--text-secondary);margin-bottom:24px}
.error-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--blue);color:#fff;font-size:15px;font-weight:700;
  border:none;border-radius:999px;padding:12px 28px;cursor:pointer;text-decoration:none;
}
</style>
</head>
<body>

<div class="x-header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    <span>SNS資産価値診断</span>
    <span class="report-badge">詳細レポート</span>
  </div>
</div>

<div class="container" id="reportContainer">
  <!-- Content rendered by JS -->
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const LINE_URL = 'https://lin.ee/EFIZkVv';
const DIAGNOSIS_URL = './index.html';

const PLATFORM_MAP = {
  x:{name:'X (旧Twitter)',icon:'𝕏',color:'#000'},
  instagram:{name:'Instagram',icon:'📷',color:'#E1306C'},
  tiktok:{name:'TikTok',icon:'🎵',color:'#010101'},
  youtube:{name:'YouTube',icon:'▶',color:'#FF0000'},
  threads:{name:'Threads',icon:'🔗',color:'#000'},
  other:{name:'その他',icon:'📱',color:'#333'},
};

const GENRE_MAP = {
  'side-business':'副業','business':'ビジネス','sns-marketing':'SNS運用','ai':'AI活用',
  'career':'キャリア','money':'お金・投資','beauty':'美容','health':'健康',
  'lifestyle':'ライフスタイル','parenting':'子育て','workstyle':'働き方','other':'その他'
};
const MODEL_MAP = {
  affiliate:'アフィリエイト','content-sales':'コンテンツ販売',pr:'PR案件',
  consulting:'コンサル・相談',agency:'SNS運用代行',community:'コミュニティ運営',undecided:'未定'
};
const STYLE_MAP = {
  experience:'実体験共有',knowhow:'ノウハウ解説',review:'比較・レビュー',
  daily:'日常発信',story:'ストーリー型',opinion:'意見発信',undecided:'未定'
};
const CONCERN_MAP = {
  followers:'フォロワー増加',content:'投稿ネタ',monetization:'収益化',
  direction:'方向性',profile:'プロフィール',funnel:'導線設計'
};

// ============================================================
// VALUATION LOGIC (same as diagnosis app)
// ============================================================
function platformMult(p){return{x:1.0,instagram:1.1,tiktok:1.15,youtube:1.3,threads:0.8,other:0.7}[p]||1.0}
function calcFollower(v){return{'0-100':1000,'101-500':5000,'501-1000':20000,'1001-3000':80000,'3001-10000':300000,'10001+':1000000}[v]||1000}
function calcEngagement(v){return{under10:1000,'10-30':5000,'31-100':20000,'101-300':80000,'301+':200000}[v]||1000}
function calcGenre(v){return{'sns-marketing':200000,'side-business':150000,ai:150000,business:120000,career:100000,money:100000,beauty:80000,health:80000,lifestyle:60000,parenting:60000,workstyle:60000,other:50000}[v]||50000}
function calcContinuity(post,dur,time){
  const p={'0':0,'1-2':5000,'3-4':20000,'5-6':50000,daily:100000}[post]||0;
  const d={under1m:0,'1-3m':10000,'3-6m':30000,'6m-1y':60000,'1y+':100000}[dur]||0;
  const t={under30m:0,'30m-1h':10000,'1-2h':30000,'2-3h':50000,'3h+':80000}[time]||0;
  return Math.min(p+d+t,180000);
}
function calcGrowth(v){return{none:0,slow:20000,steady:80000,rapid:200000}[v]||0}
function calcMonetization(rev,model,ser){
  const r={none:0,little:20000,under10k:50000,'10k-100k':150000,'100k+':300000}[rev]||0;
  const m={affiliate:40000,'content-sales':70000,pr:30000,consulting:60000,agency:60000,community:50000,undecided:10000}[model]||0;
  const s={curious:0,'10k':20000,'50k-100k':50000,serious:100000}[ser]||0;
  return r+m+s;
}

function calcConfidence(a){
  let s=80;
  const fLvl=['0-100','101-500','501-1000','1001-3000','3001-10000','10001+'].indexOf(a.q2_followers);
  const lLvl=['under10','10-30','31-100','101-300','301+'].indexOf(a.q3_likes);
  if(Math.abs(fLvl-lLvl)<=1)s+=5;
  const pLvl=['0','1-2','3-4','5-6','daily'].indexOf(a.q4_posts_per_week);
  const gLvl=['none','slow','steady','rapid'].indexOf(a.q10_growth);
  if(pLvl>=gLvl)s+=5;
  const dLvl=['under1m','1-3m','3-6m','6m-1y','1y+'].indexOf(a.q5_duration);
  const rLvl=['none','little','under10k','10k-100k','100k+'].indexOf(a.q9_revenue);
  if(dLvl>=rLvl)s+=5;
  return s;
}

function applyAdjustments(a,bd){
  const adj={...bd};let cAdj=0;const comments=[];
  if(a.q2_followers==='0-100'&&a.q3_likes==='301+'){cAdj-=10;comments.push('一部回答にズレがある可能性があります');}
  if(a.q4_posts_per_week==='0'&&a.q10_growth==='rapid'){cAdj-=15;adj.growthValue=Math.max(adj.growthValue-50000,0);comments.push('成長と運用量にズレがある可能性があります');}
  if(a.q9_revenue==='none'&&a.q14_seriousness==='serious')comments.push('まずは小さな成果づくりが優先です');
  if(a.q7_style==='undecided'&&a.q12_concern==='direction')comments.push('発信スタイルの明確縬が最優先課題です');
  if(a.q11_time==='under30m'&&(a.q14_seriousness==='50k-100k'||a.q14_seriousness==='serious')){cAdj-=8;comments.push('目標に対して投下時間が不足している可能性があります');}
  return{adj,cAdj,comments};
}

function calcPercentile(total){
  if(total>=700001)return Math.floor(Math.random()*14)+1;
  if(total>=300001)return Math.floor(Math.random()*20)+15;
  if(total>=100001)return Math.floor(Math.random()*25)+35;
  if(total>=30001)return Math.floor(Math.random()*20)+60;
  return Math.floor(Math.random()*16)+80;
}

function predictFuture(cur,a,conf){
  const gL=['none','slow','steady','rapid'].indexOf(a.q10_growth);
  const pL=['0','1-2','3-4','5-6','daily'].indexOf(a.q4_posts_per_week);
  const sL=['curious','10k','50k-100k','serious'].indexOf(a.q14_seriousness);
  const dL=['under1m','1-3m','3-6m','6m-1y','1y+'].indexOf(a.q5_duration);
  const gs=gL+pL+sL+dL;
  let m3,m6,m12;
  if(gs>=12){m3=1.5+Math.random()*.7;m6=2+Math.random()*1.5;m12=3+Math.random()*3;}
  else if(gs>=7){m3=1.3+Math.random()*.5;m6=1.6+Math.random()*.9;m12=2.2+Math.random()*1.8;}
  else{m3=1.1+Math.random()*.3;m6=1.2+Math.random()*.5;m12=1.4+Math.random()*.8;}
  if(conf<60){m3*=.85;m6*=.8;m12*=.75;}
  const r=v=>Math.round(v/10000)*10000;
  return{three:r(cur*m3),six:r(cur*m6),twelve:r(cur*m12)};
}

// ============================================================
// REVENUE SIMULATION
// ============================================================
function calcRevenueSim(a, total) {
  const model = a.q13_model || 'undecided';
  const followers = a.q2_followers;
  const engagement = a.q3_likes;
  const genre = a.q6_genre;

  // Base monthly revenue estimates by model
  const modelBase = {
    affiliate: { low: 3000, mid: 30000, high: 150000 },
    'content-sales': { low: 5000, mid: 50000, high: 300000 },
    pr: { low: 5000, mid: 30000, high: 200000 },
    consulting: { low: 10000, mid: 80000, high: 500000 },
    agency: { low: 30000, mid: 100000, high: 500000 },
    community: { low: 5000, mid: 50000, high: 300000 },
    undecided: { low: 1000, mid: 15000, high: 80000 },
  };

  const base = modelBase[model] || modelBase.undecided;

  // Follower multiplier
  const fMult = {'0-100':0.3,'101-500':0.5,'501-1000':0.7,'1001-3000':1.0,'3001-10000':1.5,'10001+':2.5}[followers]||0.3;

  // Engagement multiplier
  const eMult = {under10:0.5,'10-30':0.7,'31-100':1.0,'101-300':1.3,'301+':1.8}[engagement]||0.5;

  // Genre multiplier
  const gMult = {'sns-marketing':1.3,'side-business':1.2,ai:1.2,business:1.1,career:1.0,money:1.1,beauty:0.9,health:0.9,lifestyle:0.7,parenting:0.7,workstyle:0.8,other:0.6}[genre]||0.7;

  const mult = fMult * eMult * gMult;

  const current = Math.round(base.low * mult / 1000) * 1000;
  const m3 = Math.round(base.low * mult * 1.5 / 1000) * 1000;
  const m6 = Math.round(base.mid * mult * 0.6 / 1000) * 1000;
  const m12 = Math.round(base.mid * mult / 1000) * 1000;
  const potential = Math.round(base.high * mult * 0.5 / 1000) * 1000;

  return { current, m3, m6, m12, potential, model };
}

// ============================================================
// REPORT-SPECIFIC INSIGHTS
// ============================================================
function genDetailedStrengths(a, bd) {
  const s = [];
  if(bd.genreValue >= 120000) s.push({title:'収益化向きのジャンル', text:`${GENRE_MAP[a.q6_genre]||'選択ジャンル'}は、SNS収益化と相性が良いジャンルです。市場ニーズが明確で、マネタイズの選択肢も豊富です。`});
  if(bd.continuityValue >= 80000) s.push({title:'継続力がある', text:'投稿頻度と運用歴のバランスが取れており、アルゴリズムに評価されやすい運用ができています。'});
  if(bd.engagementValue >= 20000) s.push({title:'エンゲージメントが高い', text:'フォロワー規模に対していいね率が高く、コンテンツの訴求力があります。この強みを活かした収益化が効果的です。'});
  if(bd.growthValue >= 80000) s.push({title:'成長トレンドが良好', text:'フォロワーの増加ペースが安定しており、この勢いを維持できれば資産価値は加速的に伸びます。'});
  if(a.q9_revenue !== 'none') s.push({title:'収益化の実縞あり', text:'すでに収益化の経験があるため、次のステップ（単価アップ・横展開）に進みやすい状態です。</text>});
  if(a.q7_style !== 'undecided') s.push({title:'発信スタイルが確立', text:`${STYLE_MAP[a.q7_style]||''}という明確な発信スタイルがあり、ブランドが積み上がりやすい状態です。`});
  if(!s.length) s.push({title:'伸びしろが大きい', text:'まだ発展途上ですが、改善の余地が多いということは伸びしろが大きいということでもあります。'});
  return s.slice(0,3);
}

function genDetailedWeaknesses(a, bd) {
  const w = [];
  if(a.q4_posts_per_week==='0'||a.q4_posts_per_week==='1-2') w.push({title:'投稿頻度が低い', text:'現在の投稿頻度では、アルゴリズムの優遇を受けにくく、フォロワー増加やリーチが伸びにくい状態です。最低でも週3〜4本を目指しましょう。'});
  if(a.q9_revenue==='none'&&a.q13_model==='undecided') w.push({title:'収益導線がない', text:'収益化モデルが未定のまま発信を続けると、フォロワーが増えても収益に繋がりません。早めにマネタイズの方向性を決めることが重要です。'});
  if(a.q7_style==='undecided') w.push({title:'発信スタイルが未確定', text:'スタイルが定まっていないと、フォロワーが「この人をフォローする理由」を見つけにくくなります。まず1つのスタイルに絞って発信を続けましょう。'});
  if(bd.engagementValue<=5000) w.push({title:'エンゲージメントが低い', text:'いいね数が少ないと、アルゴリズムが投稿をあまり拡散しません。投稿の冒頭（フック）を改善し、保存やシェアされるコンテンツを意識しましょう。'});

function confLabel(s){

function decodeData() {
  const params = new URLSearchParams(window.location.search);
  const d = params.get('d');
  if (!d) return null;
  try {
    return JSON.parse(atob(d));
  } catch(e) {
    return null;
  }
}

    }, {threshold: .08});
    revs.forEach(r => obs.observe(r));
    revs.forEach((r,i) => { if(i<3) setTimeout(()=>r.classList.add('visible'), 100+i*150); });
  }, 100);
}

function animateCountUp(el, target, duration) {
  let start = null;
  function step(ts) {
    if(!start) start = ts;
    const progress = Math.min((ts-start)/duration, 1);
    const eased = progress===1 ? 1 : 1-Math.pow(2,-10*progress);
    el.textContent = '¥' + Math.floor(eased*target).toLocaleString();
    if(progress<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function showError() {
  document.getElementById('reportContainer').innerHTML = `
    <div class="error-state">
      <h2>レポートデータがありません</h2>
      <p>まずSNS資産価値診断を受けて、<br>結果からレポートを取得してください。</p>
      <a href="${DIAGNOSIS_URL}" class="error-btn">診断を受ける</a>
    </div>
  `;
}

// ===== INIT =====
const data = decodeData();
if(data) {
  renderReport(data);
} else {
  showError();
}
</script>
