.section-title::before {

const topModel=models[0]?.name||"アフィリエイト";

function renderDiagnosis(el){
  const q=QUESTIONS[state.currentQ];const progress=(state.currentQ/QUESTIONS.length)*100;
  const encs={5:"この診断ではあなたに合う戦略がわかります",15:"折り返し地点。一貫性も加味して精度UP中...",23:"あと少しで結果が出ます"};
  const enc=encs[state.currentQ]||"";
  el.innerHTML=`
  <div style="min-height:100vh;background:#fff">
    <div style="position:sticky;top:0;z-index:10;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:14px 20px 14px;border-bottom:1px solid #eee">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;max-width:480px;margin-left:auto;margin-right:auto">

      <div class="progress-track" style="max-width:480px;margin:0 auto"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    ${enc?`<div style="text-align:center;padding:16px 20px 0"><span class="enc-pill">${enc}</span></div>`:""}
    <div style="padding:36px 20px 120px;max-width:480px;margin:0 auto" class="fade-in">
      <span style="font-size:11px;color:var(--lime-dark);font-weight:800;letter-spacing:2px;display:block;margin-bottom:10px;background:var(--lime);display:inline-block;padding:2px 10px;border-radius:3px">${q.category}</span>
      <h2 style="font-size:22px;font-weight:900;color:var(--text);margin-bottom:8px;line-height:1.5;margin-top:12px">${q.question}</h2>
      ${q.description?`<p style="font-size:13px;color:var(--text-dim);margin-bottom:28px">${q.description}</p>`:""}
      ${q.allowMultiple?`<p style="font-size:12px;color:var(--accent-green);margin-bottom:18px;font-weight:700;background:#f0fff4;display:inline-block;padding:4px 12px;border-radius:4px">複数選択OK</p>`:""}
      <div>
        ${q.options.map((o,i)=>{
          const isSel=q.allowMultiple?state.multiSelect.includes(i):state.answers[q.id]===i;
          return`<button class="opt-btn${isSel?" selected":""}" onclick="${q.allowMultiple?`toggleMulti(${i})`:`selectSingle(${i})`}">
            ${q.allowMultiple?`<span class="opt-checkbox">${isSel?"✓":""}</span>`:""}${o.label}
          </button>`}).join("")}
      </div>
      ${q.allowMultiple?`<button onclick="confirmMulti()" style="margin-top:16px;width:100%;padding:16px;font-size:16px;font-weight:800;border-radius:60px;border:none;cursor:${state.multiSelect.length?"pointer":"default"};background:${state.multiSelect.length?"var(--lime)":"#e5e5e5"};color:${state.multiSelect.length?"var(--black)":"#aaa"};transition:all 0.3s">次へ進む →</button>`:""}
    </div>
  </div>`}

            <div style="background:#1a1a1a;border-radius:12px;padding:16px;text-align:center">
              <p style="font-size:11px;color:#888;font-weight:700;margin-bottom:6px">${m.month}</p>
              <p style="font-size:24px;font-weight:900;color:var(--lime)">${m.amount}<span style="font-size:12px;color:#666">万円</span></p>
              <p style="font-size:10px;color:#666;margin-top:6px;line-height:1.5">${m.note}</p>
            </div>`).join("")}
        </div>
        <p style="font-size:10px;color:#555;line-height:1.6">${revenueSimulation.assumptions}</p>
      </div>

      <div style="text-align:center;padding:24px 0">
        <button onclick="startDiagnosis()" style="background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;text-decoration:underline">もう一度診断する</button>
      </div>
    </div>
  </div>`}

// ============================================================
// ACTIONS
// ============================================================
function startDiagnosis(){state={screen:"diagnosis",currentQ:0,answers:{},multiSelect:[],result:null};render();window.scrollTo(0,0)}
function selectSingle(i){const q=QUESTIONS[state.currentQ];state.answers[q.id]=i;if(state.currentQ<QUESTIONS.length-1){setTimeout(()=>{state.currentQ++;state.multiSelect=[];render();window.scrollTo(0,0)},180)}else finishDiagnosis()}
function toggleMulti(i){if(state.multiSelect.includes(i))state.multiSelect=state.multiSelect.filter(x=>x!==i);else state.multiSelect.push(i);render()}
function confirmMulti(){if(!state.multiSelect.length)return;const q=QUESTIONS[state.currentQ];state.answers[q.id]=[...state.multiSelect];if(state.currentQ<QUESTIONS.length-1){state.currentQ++;state.multiSelect=[];render();window.scrollTo(0,0)}else finishDiagnosis()}
function goBack(){if(state.currentQ>0){state.currentQ--;const pq=QUESTIONS[state.currentQ];const prev=state.answers[pq.id];state.multiSelect=pq.allowMultiple&&Array.isArray(prev)?[...prev]:[];render();window.scrollTo(0,0)}}
function finishDiagnosis(){state.screen="loading";render();window.scrollTo(0,0);setTimeout(()=>{state.result=computeResult(state.answers);state.screen="result";render();window.scrollTo(0,0)},2800)}

// ============================================================
// RENDER MAIN
// ============================================================
function render(){
  const app=document.getElementById("app");
  if(state.screen==="top")renderTop(app);
  else if(state.screen==="diagnosis")renderDiagnosis(app);
  else if(state.screen==="loading")renderLoading(app);
  else if(state.screen==="result")renderResult(app);
}

render();
</script>
</body>
</html>
