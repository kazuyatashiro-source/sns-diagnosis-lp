function confidence(ans){
  let v=80;const g=i=>ans[i]??-1;
  if((g(4)<=1&&g(10)<=1)||(g(4)>=2&&g(10)>=2))v+=5;
  if((g(3)===0&&(g(13)===1||g(13)===2))||(g(3)===1&&g(13)===0)||(g(3)===3&&g(13)===3)||(g(3)===4&&g(13)===4))v+=5;
  if((g(9)<=1&&[1,2,3].includes(g(14)))||(g(9)>=2&&[0,4,6].includes(g(14))))v+=5;
  if((g(11)===0&&g(16)===0)||(g(11)===2&&g(16)===1))v+=5;
  if(g(4)===0&&g(10)===3)v-=15;else if(g(4)<=1&&g(10)>=2)v-=10;
  if(g(7)===3&&g(13)===0)v-=10;
  if(g(8)===3&&(g(13)===1||g(13)===2))v-=10;
  if(g(9)===3&&(g(14)===2||g(14)===3))v-=10;
  if(g(15)===3&&g(16)===1)v-=8;
  v=Math.max(40,Math.min(95,v));
  let lb;if(v>=85)lb="氓聸聻莽颅聰茫聛庐盲赂聙猫虏芦忙聙搂茫聛聦茅芦聵茫聛聫茫聙聛忙炉聰猫录聝莽職聞莽虏戮氓潞娄茫聛庐茅芦聵茫聛聞莽碌聬忙聻聹茫聛搂茫聛聶";else if(v>=70)lb="茫聛聤茫聛聤茫聜聙茫聛颅盲赂聙猫虏芦茫聛聴茫聛娄茫聛聤茫聜聤茫聙聛氓聫聜猫聙聝氓聙陇茫聛篓茫聛聴茫聛娄氓聧聛氓聢聠忙麓禄莽聰篓茫聛搂茫聛聧茫聛戮茫聛聶";else if(v>=55)lb="盲赂聙茅聝篓氓聸聻莽颅聰茫聛芦忙聫潞茫聜聦茫聛聦茫聛聜茫聜聤茫聛戮茫聛聶";else lb="莽聬聠忙聝鲁茫聛篓莽聫戮莽聤露茫聛芦茫聜庐茫聝拢茫聝聝茫聝聴茫聛聦茫聛聜茫聜聥氓聫炉猫聝陆忙聙搂茫聛聦茫聛聜茫聜聤茫聛戮茫聛聶";
  return{score:v,label:lb};
}

function topType(sc){let m=-999,p="stacker";Object.entries(sc).forEach(([k,v])=>{if(v>m){m=v;p=k;}});return p;}
function secondType(sc,pri){let m=-999,s=null;Object.entries(sc).forEach(([k,v])=>{if(k!==pri&&v>m){m=v;s=k;}});return s;}

   ============================================================ */
function App(){
  const [page,setPage]=useState("home");
  const [ans,setAns]=useState([]);
  const [qi,setQi]=useState(0);
  const [result,setResult]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [locked,setLocked]=useState(false);

  const start=()=>{setAns([]);setQi(0);setPage("quiz");window.scrollTo({top:0,behavior:'instant'});};
  const home=()=>{setPage("home");window.scrollTo({top:0,behavior:'instant'});};

  const answer=(oi)=>{
    if(locked)return;
    setLocked(true);
    const na=[...ans];na[qi]=oi;setAns(na);
    setTimeout(()=>{
      if(qi<QS.length-1){setQi(qi+1);setLocked(false);}
      else{
        setAnalyzing(true);
        setTimeout(()=>{
          const raw=calcScores(na);
          const{scores:adj,comments}=adjust(raw,na);
          const conf=confidence(na);
          const pri=topType(adj);
          const sec=secondType(adj,pri);
          setResult({pri,sec,scores:adj,conf,comments,ans:na});
          setAnalyzing(false);
          setPage("result");
          setLocked(false);
          window.scrollTo({top:0,behavior:'instant'});
        },2200);
      }
    },280);
  };

  if(analyzing)return <AnalyzingScreen />;
  if(page==="home")return <HomePage onStart={start}/>;
  if(page==="quiz")return <QuizPage qi={qi} ans={ans} onAnswer={answer} onBack={()=>{if(qi>0)setQi(qi-1);}} locked={locked}/>;
  if(page==="result")return <ResultPage result={result} onRestart={home}/>;
  return null;
}

        <div className="animate-bounce-in" style={{animationDelay:'.2s',width:150,height:150,borderRadius:28,background:t.gradient,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px',fontSize:64,boxShadow:`0 12px 32px ${t.color}35`}}>
          {t.icon}
        </div>
        <h1 style={{fontSize:20,fontWeight:800,marginBottom:10,lineHeight:1.4}}>

        <p style={{fontSize:15,fontWeight:700,color:t.color,marginBottom:16}}>{t.short}</p>
        <p style={{fontSize:14,color:'var(--text-sub)',lineHeight:1.75,padding:'0 4px'}}>{t.desc}</p>
      </section>

      <div style={{padding:'0 20px'}}>
        {/* 莽聶潞盲驴隆茫聜鹿茫聜驴茫聜陇茫聝芦 */}
        <div className="card animate-slide-right" style={{animationDelay:'.1s'}}>
          <div className="card-title"><div className="card-title-bar" style={{background:t.color}}/> 氓聬聭茫聛聞茫聛娄茫聛聞茫聜聥莽聶潞盲驴隆茫聜鹿茫聜驴茫聜陇茫聝芦</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {t.styles.map((s,i)=><span key={i} className="tag" style={{background:`${t.color}12`,color:t.color}}>{s}</span>)}
          </div>
        </div>

        {/* 氓聫聨莽聸聤氓聦聳茫聝垄茫聝聡茫聝芦 */}
        <div className="card animate-slide-right" style={{animationDelay:'.2s'}}>
          <div className="card-title"><div className="card-title-bar" style={{background:t.color}}/> 氓聬聭茫聛聞茫聛娄茫聛聞茫聜聥氓聫聨莽聸聤氓聦聳茫聝垄茫聝聡茫聝芦</div>
          {t.monetization.map((m,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <div style={{width:24,height:24,borderRadius:12,background:t.gradient,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
              <span style={{fontSize:14,fontWeight:600}}>{m}</span>
            </div>
          ))}
        </div>

        {/* 忙聢娄茫聛聞忙聳鹿 */}
        <div className="card animate-slide-right" style={{animationDelay:'.3s'}}>
          <div className="card-title"><div className="card-title-bar" style={{background:t.color}}/> 莽聸赂忙聙搂茫聛庐猫聣炉茫聛聞忙聢娄茫聛聞忙聳鹿</div>
          {t.strategies.map((s,i)=>(
            <div key={i} style={{display:'flex',gap:8,marginBottom:6}}>
              <span style={{color:t.color,fontWeight:700,flexShrink:0}}>芒聙垄</span>
              <span style={{fontSize:13,color:'var(--text-sub)',lineHeight:1.6}}>{s}</span>
            </div>
          ))}
        </div>

        {/* 忙鲁篓忙聞聫莽聜鹿 */}
        <div className="animate-slide-right" style={{animationDelay:'.4s',background:'#fffbeb',borderRadius:'var(--radius-lg)',border:'1px solid #fde68a',padding:20,marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:700,color:'#92400e',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>芒職聽茂赂聫 忙鲁篓忙聞聫莽聜鹿</div>

          {result.comments.length>0&&(
            <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #fde68a'}}>
              {result.comments.map((c,i)=><p key={i} style={{fontSize:12,color:'#b45309',lineHeight:1.5,marginTop:i?4:0}}>{c}</p>)}
            </div>
          )}
        </div>

        {/* 盲驴隆茅聽录氓潞娄 */}
        <div className="card animate-slide-right" style={{animationDelay:'.5s'}}>
          <div className="card-title">猫篓潞忙聳颅盲驴隆茅聽录氓潞娄</div>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:6}}>
            <div style={{flex:1,height:8,background:'var(--border-light)',borderRadius:4,overflow:'hidden'}}>
              <div style={{height:'100%',width:showConf?`${result.conf.score}%`:'0%',background:t.gradient,borderRadius:4,transition:'width 1.2s cubic-bezier(.4,0,.2,1)'}}/>
            </div>
            <span style={{fontSize:15,fontWeight:700,color:'var(--text)',minWidth:42,textAlign:'right'}}>{result.conf.score}%</span>
          </div>
          <p style={{fontSize:12,color:'var(--text-muted)'}}>{result.conf.label}</p>
        </div>

        {/* 茫聜碌茫聝聳茫聜驴茫聜陇茫聝聴 */}
        {sec&&(
          <div className="card animate-slide-right" style={{animationDelay:'.6s'}}>
            <div className="card-title">莽聸赂忙聙搂茫聛庐猫聣炉茫聛聞茫聜碌茫聝聳茫聜驴茫聜陇茫聝聴</div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:48,height:48,borderRadius:14,background:sec.gradient,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,boxShadow:`0 4px 12px ${sec.color}25`}}>{sec.icon}</div>
              <div><p style={{fontSize:14,fontWeight:700}}>{sec.name}</p><p style={{fontSize:12,color:'var(--text-muted)'}}>{sec.short}</p></div>
            </div>
          </div>
        )}

        {/* LINE猫陋聵氓掳聨茫聝聠茫聜颅茫聜鹿茫聝聢 */}
        <div style={{textAlign:'center',padding:'20px 0 8px'}}>
          <p style={{fontSize:14,color:'var(--text-sub)',lineHeight:1.8}}>茫聛聜茫聛陋茫聛聼茫聛庐茫聜驴茫聜陇茫聝聴茫聛炉猫娄聥茫聛聢茫聛娄茫聛聞茫聛戮茫聛聶茫聛聦茫聙聛</p>
          <p style={{fontSize:14,color:'var(--text-sub)',lineHeight:1.8}}>茫聛聯茫聛聯茫聛聥茫聜聣氓聟聢茫聛炉<b style={{color:'var(--text)'}}>忙聢娄茫聛聞忙聳鹿茫聛庐猫篓颅猫篓聢</b>茫聛聦茅聡聧猫娄聛茫聛搂茫聛聶茫聙聜</p>
        </div>

        {/* 茫聝颅茫聝聝茫聜炉茫聜禄茫聜炉茫聜路茫聝搂茫聝鲁 */}
        <div style={{position:'relative',marginTop:12}}>
          <div style={{borderRadius:'var(--radius-lg)',border:'2px solid var(--border-light)',background:'var(--bg-sub)',padding:24,overflow:'hidden',position:'relative',minHeight:200}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>茫聛聜茫聛陋茫聛聼氓掳聜莽聰篓茫聛庐猫漏鲁莽麓掳氓聢聠忙聻聬</h3>
            <div style={{opacity:.3,filter:'blur(2.5px)',pointerEvents:'none',userSelect:'none'}}>
              {locked.map((item,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                  <div style={{width:22,height:22,borderRadius:11,background:'#cbd5e1',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:10}}>冒聼聰聮</div>
                  <span style={{fontSize:13,color:'var(--text-sub)'}}>{item}</span>
                </div>
              ))}
            </div>
            <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom, transparent 10%, rgba(255,255,255,.85) 50%, white 70%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',paddingBottom:28}}>
              <div style={{background:'rgba(255,255,255,.95)',padding:'8px 18px',borderRadius:'var(--radius-full)',border:'1px solid var(--border-light)',marginBottom:10,display:'flex',alignItems:'center',gap:6,boxShadow:'var(--shadow-sm)'}}>
                <span style={{fontSize:12}}>冒聼聰聮</span>
                <span style={{fontSize:12,fontWeight:600,color:'var(--text-sub)'}}>猫漏鲁莽麓掳莽碌聬忙聻聹茫聛炉LINE茫聛搂莽聞隆忙聳聶茅聟聧氓赂聝茫聛聴茫聛娄茫聛聞茫聛戮茫聛聶</span>
              </div>
              <p style={{fontSize:11,color:'var(--text-muted)'}}>茫聛聯茫聛庐莽露職茫聛聧茫聛搂茫聛炉茫聙聛茫聛聜茫聛陋茫聛聼茫聛庐茫聜驴茫聜陇茫聝聴茫聛芦氓聬聢茫聛聠氓聥聺茫聛隆忙聳鹿茫聜聮氓聟路盲陆聯氓聦聳茫聛聴茫聛戮茫聛聶</p>
            </div>
          </div>
        </div>

        {/* LINE CTA */}
        <div style={{textAlign:'center',marginTop:24}}>
          <a href={LINE_URL} target="_blank" rel="noopener noreferrer" className="btn-line" style={{display:'inline-flex'}}>
            <LineIcon size={22}/>
            莽聞隆忙聳聶茫聛搂茫聛聜茫聛陋茫聛聼氓聬聭茫聛聭茫聛庐忙聢娄莽聲楼茫聜聮氓聫聴茫聛聭氓聫聳茫聜聥
          </a>
          <p style={{fontSize:12,color:'var(--text-muted)',marginTop:12}}>莽聶禄茅聦虏氓戮聦茫聛聶茫聛聬茫聛芦猫漏鲁莽麓掳莽碌聬忙聻聹茫聜聮莽垄潞猫陋聧茫聛搂茫聛聧茫聛戮茫聛聶</p>
        </div>

        {/* 2nd CTA */}
        <div style={{marginTop:24,background:t.colorLight,borderRadius:'var(--radius-lg)',padding:24,textAlign:'center',border:`1px solid ${t.color}20`}}>
          <p style={{fontSize:13,color:'var(--text-sub)',lineHeight:1.7,marginBottom:16}}>
            茫聛聜茫聛陋茫聛聼茫聛庐茫聜驴茫聜陇茫聝聴茫聛芦氓聬聢茫聜聫茫聛聸茫聛聼<br/><b style={{color:t.color}}>3茫聝露忙聹聢茫聝颅茫聝录茫聝聣茫聝聻茫聝聝茫聝聴</b>茫聛篓<br/>
            <b style={{color:t.color}}>氓聙聥氓聢楼莽聸赂猫芦聡</b>茫聛庐茫聛聰忙隆聢氓聠聟茫聜聜LINE茫聛搂氓聫聴茫聛聭氓聫聳茫聜聦茫聛戮茫聛聶
          </p>
          <a href={LINE_URL} target="_blank" rel="noopener noreferrer" className="btn-line" style={{display:'inline-flex',maxWidth:300,fontSize:14}}>
            <LineIcon size={20}/>
            盲禄聤茫聛聶茫聛聬LINE莽聶禄茅聦虏茫聛聶茫聜聥
          </a>
        </div>

        {/* 茫聜聜茫聛聠盲赂聙氓潞娄 */}
        <div style={{textAlign:'center',paddingTop:32}}>
          <button onClick={onRestart} style={{background:'none',border:'none',fontSize:13,color:'var(--text-muted)',textDecoration:'underline',cursor:'pointer'}}>茫聜聜茫聛聠盲赂聙氓潞娄猫篓潞忙聳颅茫聛聶茫聜聥</button>
        </div>
      </div>

      <footer style={{padding:'32px 20px',textAlign:'center'}}><p style={{fontSize:11,color:'#d1d5db'}}>SNS氓聣炉忙楼颅茫聜驴茫聜陇茫聝聴猫篓潞忙聳颅</p></footer>
    </div>
  );
}

/* ============================================================

ReactDOM.render(<App/>,document.getElementById("root"));
