/* ============================================================
   DIAGNOSIS ENGINE
   ============================================================ */
function calcScores(ans){const s={};TYPE_ORDER.forEach(t=>s[t]=0);ans.forEach((ai,qi)=>{const q=QS[qi];if(!q||ai<0||ai>=q.opts.length)return;Object.entries(q.opts[ai].s).forEach(([t,v])=>s[t]+=v);});return s;}

function adjust(sc,ans){
  const a={...sc},c=[];const g=i=>ans[i]??-1;
  if(g(4)===0&&g(10)===3){a.stacker-=10;a.empathy-=4;c.push("継続意欲は高い一方で、反応依存がやや強い傾向があります");}
  if(g(7)===3&&g(13)===0){a.expert-=8;c.push("教える型への関心はあるものの、現状は発信ハードルが課題です");}
  if(g(9)===3&&(g(14)===2||g(14)===3)){a.sales-=10;c.push("収益化意欲はある一方で、提案への心理的抵抗がボトルネックです");}
  if(g(5)===0&&g(4)===3){a.stacker-=8;c.push("瞬発力寄りの思考が強く、継続設計は別途必要です");}
  if(g(6)===2&&g(3)===4){a.worldview-=5;a.anonymous+=3;c.push("見せ方より切り口設計が重要になりやすいです");}
  if(g(15)===3){a.practice-=6;a.sales-=4;a.stacker-=3;c.push("情報収集に対して実行量が不足しやすい傾向があります");}
  if(g(8)===3&&g(13)===1){a.empathy-=6;a.practice-=5;c.push("過程の共有に価値はありますが、現状は自己開示ハードルが高めです");}
  if(g(11)===4&&g(9)===3){a.sales-=6;c.push("設計理解はある一方で、実際の提案場面に心理的ハードルが残っています");}
  return{scores:a,comments:c};
}

function confidence(ans){
  let v=80;const g=i=>ans[i]??-1;
  if((g(4)<=1&&g(10)<=1)||(g(4)>=2&&g(10)>=2))v+=5;
  if((g(3)===0&&(g(13)===1||g(13)===2))||(g(3)===1&&g(13)===0)||(g(3)===3&&g(13)===3)||(g(3)===4&&g(13)===4))v+=5;
  if((g(9)<=1&&[1,2,3].includes(g(14)))||(g(9)>=2&&[0,4,6].includes(g(14))))v+=5;
  if((g(11)===0&&g(16)===0)||(g(11)===2&&g(16)===1))v+=5;
  if(g(4)===0&&g(10)===3)v-=15;else if(g(4)<=1&&g(10)>=2)v-=10;
  if(g(7)===3&&g(13)===0)v-=10;
  if(g(8)===3&&(g(13)===1||g(13)===2))v-=10;
  if(g(9)===3&&(g(14)===2||g(14)===3))v-=10;
  if(g(15)===3&&g(16)===1)v-=8;
  v=Math.max(40,Math.min(95,v));
  let lb;if(v>=85)lb="回答の一貫性が高く、比較的精度の高い結果です";else if(v>=70)lb="おおむね一貫しており、参考値として十分活用できます";else if(v>=55)lb="一部回答に揺れがあります";else lb="理想と現状にギャップがある可能性があります";
  return{score:v,label:lb};
}

function topType(sc){let m=-999,p="stacker";Object.entries(sc).forEach(([k,v])=>{if(v>m){m=v;p=k;}});return p;}
function secondType(sc,pri){let m=-999,s=null;Object.entries(sc).forEach(([k,v])=>{if(k!==pri&&v>m){m=v;s=k;}});return s;}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [page,setPage]=useState("home");
  const [ans,setAns]=useState([]);
  const [qi,setQi]=useState(0);
  const [result,setResult]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [locked,setLocked]=useState(false);

  const start=()=>{setAns([]);setQi(0);setPage("quiz");window.scrollTo({top:0,behavior:'instant'});};
  const home=()=>{setPage("home");window.scrollTo({top:0,behavior:'instant'});};

  const answer=(oi)=>{
    if(locked)return;
    setLocked(true);
    const na=[...ans];na[qi]=oi;setAns(na);
    setTimeout(()=>{
      if(qi<QS.length-1){setQi(qi+1);setLocked(false);}
      else{
        setAnalyzing(true);
        setTimeout(()=>{
          const raw=calcScores(na);
          const{scores:adj,comments}=adjust(raw,na);
          const conf=confidence(na);
          const pri=topType(adj);
          const sec=secondType(adj,pri);
          setResult({pri,sec,scores:adj,conf,comments,ans:na});
          setAnalyzing(false);
          setPage("result");
          setLocked(false);
          window.scrollTo({top:0,behavior:'instant'});
        },2200);
      }
    },280);
  };

  if(analyzing)return <AnalyzingScreen />;
  if(page==="home")return <HomePage onStart={start}/>;
  if(page==="quiz")return <QuizPage qi={qi} ans={ans} onAnswer={answer} onBack={()=>{if(qi>0)setQi(qi-1);}} locked={locked}/>;
  if(page==="result")return <ResultPage result={result} onRestart={home}/>;
  return null;
}

                  <div style={{width:22,height:22,borderRadius:11,background:'#cbd5e1',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:10}}>🔒</div>
                  <span style={{fontSize:13,color:'var(--text-sub)'}}>{item}</span>
                </div>
              ))}
            </div>
            <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom, transparent 10%, rgba(255,255,255,.85) 50%, white 70%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',paddingBottom:28}}>
              <div style={{background:'rgba(255,255,255,.95)',padding:'8px 18px',borderRadius:'var(--radius-full)',border:'1px solid var(--border-light)',marginBottom:10,display:'flex',alignItems:'center',gap:6,boxShadow:'var(--shadow-sm)'}}>
                <span style={{fontSize:12}}>🔒</span>
                <span style={{fontSize:12,fontWeight:600,color:'var(--text-sub)'}}>詳細結果はLINEで無料配布しています</span>
              </div>
              <p style={{fontSize:11,color:'var(--text-muted)'}}>この続きでは、あなたのタイプに合う勝ち方を具体化します</p>
            </div>
          </div>
        </div>

        {/* LINE CTA */}
        <div style={{textAlign:'center',marginTop:24}}>
          <a href={LINE_URL} target="_blank" rel="noopener noreferrer" className="btn-line" style={{display:'inline-flex'}}>
            <LineIcon size={22}/>
            無料であなた向けの戦略を受け取る
          </a>
          <p style={{fontSize:12,color:'var(--text-muted)',marginTop:12}}>登録後すぐに詳細結果を確認できます</p>
        </div>

        {/* 2nd CTA */}
        <div style={{marginTop:24,background:t.colorLight,borderRadius:'var(--radius-lg)',padding:24,textAlign:'center',border:`1px solid ${t.color}20`}}>
          <p style={{fontSize:13,color:'var(--text-sub)',lineHeight:1.7,marginBottom:16}}>
            あなたのタイプに合わせた<br/><b style={{color:t.color}}>3ヶ月ロードマップ</b>と<br/>
            <b style={{color:t.color}}>個別相談</b>のご案内もLINEで受け取れます
          </p>
          <a href={LINE_URL} target="_blank" rel="noopener noreferrer" className="btn-line" style={{display:'inline-flex',maxWidth:300,fontSize:14}}>
            <LineIcon size={20}/>
            今すぐLINE登録する
          </a>
        </div>

        {/* もう一度 */}
        <div style={{textAlign:'center',paddingTop:32}}>
          <button onClick={onRestart} style={{background:'none',border:'none',fontSize:13,color:'var(--text-muted)',textDecoration:'underline',cursor:'pointer'}}>もう一度診断する</button>
        </div>
      </div>

      <footer style={{padding:'32px 20px',textAlign:'center'}}><p style={{fontSize:11,color:'#d1d5db'}}>SNS副業タイプ診断</p></footer>
    </div>
  );
}

/* ============================================================
   MOUNT
   ============================================================ */
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
